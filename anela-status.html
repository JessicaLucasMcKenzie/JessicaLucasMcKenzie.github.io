<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANELA - CLEANING PROJECT STATUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --brand: #ff5a5f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      padding: 24px;
      max-width: 800px;
      margin: 0 auto;
    }
    header {
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 { font-size: 20px; font-weight: 700; }
    .back-btn {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
    }
    .status-grid { display: flex; flex-direction: column; gap: 16px; }
    .project-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .project-details { flex: 1; }
    .project-date { font-size: 12px; font-weight: 700; color: var(--brand); text-transform: uppercase; margin-bottom: 4px; }
    .project-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .project-meta { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    
    .badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-pending { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
    .badge-complete { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>Anela Korone — Turnover Project Tracker</h1>
      <p style="font-size: 13px; color: var(--text-muted); margin-top: 2px;">Naxos Console Supervisor View</p>
    </div>
    <a href="naxos.html" class="back-btn">← Back to Console</a>
  </header>

  <div class="status-grid" id="status-feed">
    <p style="text-align: center; color: var(--text-muted); padding: 40px;">Syncing housekeeping manifests...</p>
  </div>

  <script>
    var WORKBOOK_KEY = "1TvZdAANoIITpGLbrWKGh7ujniEgPq3rgI2tNbi4yB1o";

    function fetchStatusPipeline() {
      var cacheBust = new Date().getTime();
      var url = "https://docs.google.com/spreadsheets/d/" + WORKBOOK_KEY + "/gviz/tq?tqx=out:json&sheet=Naxos%20Ops&cb=" + cacheBust;

      fetch(url)
        .then(r => r.text())
        .then(raw => {
          var cleanJson = JSON.parse(raw.substr(47).slice(0, -2));
          buildTrackerRows(cleanJson.table.rows);
        });
    }

    function cleanStr(cell) {
      if (!cell) return "";
      if (cell.f) return cell.f.toString().trim();
      return cell.v !== null ? cell.v.toString().trim() : "";
    }

    function buildTrackerRows(rows) {
      var container = document.getElementById('status-feed');
      container.innerHTML = "";

      var today = new Date();

      rows.forEach((row, idx) => {
        if (idx === 0) return;
        var c = row.c;
        if (!c || !c[1] || c[1].v === null) return;

        var checkIn = cleanStr(c[1]);
        var checkOut = cleanStr(c[2]);
        var guestName = cleanStr(c[4]);
        
        // Extract cleaning cost fee from Column J (Index 9)
        var costVal = (c[9] && typeof c[9].v === 'number') ? c[9].v : 0;
        
        var checkoutParts = checkOut.split('/');
        var checkoutDateObj = new Date(parseInt(checkoutParts[2]), parseInt(checkoutParts[0]) - 1, parseInt(checkoutParts[1]));
        
        var isComplete = checkoutDateObj < today;
        var badgeClass = isComplete ? "badge-complete" : "badge-pending";
        var badgeText = isComplete ? "✅ Cleaned" : "⏳ Scheduled";

        var card = document.createElement('div');
        card.className = "project-card";
        card.innerHTML = `
          <div class="project-details">
            <div class="project-date">Turnover Window: ${checkIn} → ${checkOut}</div>
            <div class="project-title">🏠 Casa Nai Nai</div>
            <div class="project-meta">
              <strong>Incoming Guest:</strong> ${guestName}<br>
              <strong>Assigned Crew:</strong> Anela Korone<br>
              <strong>COST/FEE:</strong> €${costVal}
            </div>
          </div>
          <div>
            <span class="badge ${badgeClass}">${badgeText}</span>
          </div>
        `;
        container.appendChild(card);
      });
    }

    window.onload = fetchStatusPipeline;
  </script>
</body>
</html>
