<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MASTER MANAGEMENT WORKSPACE</title>
  
  <!-- Under-the-hood Cache Control Layer -->
  <script>
    (function() {
      var currentVersion = "v2.2.8_force";
      if (localStorage.getItem("index_cache_key") !== currentVersion) {
        localStorage.setItem("index_cache_key", currentVersion);
        window.location.reload(true);
      }
    })();
  </script>

  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --border: #334155;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --teal: #2d6a4f;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .logo-img {
      height: 64px;
      width: auto;
      margin-bottom: 24px;
      object-fit: contain;
    }

    .card { 
      background: var(--card-bg); 
      border: 1px solid var(--border); 
      border-radius: 16px; 
      padding: 40px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      max-width: 540px;
      width: 100%;
      text-align: center;
    }

    h1 { 
      font-size: 26px; 
      font-weight: 700; 
      margin-bottom: 12px; 
      letter-spacing: -0.01em;
      color: #ffffff;
      text-transform: uppercase;
    }

    p { 
      color: var(--text-muted); 
      font-size: 15px; 
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .enter-btn { 
      display: inline-block; 
      background: var(--teal); 
      color: #ffffff; 
      padding: 16px 28px; 
      border-radius: 8px; 
      font-size: 15px; 
      font-weight: 600; 
      text-decoration: none; 
      transition: background 0.15s ease; 
      width: 100%; 
    }

    .enter-btn:hover { 
      background: #24543f; 
    }
  </style>
</head>
<body>

  <img src="jlmlogo.png" alt="JLM Solutions Logo" class="logo-img">
  
  <div class="card">
    <h1>Master Management Workspace</h1>
    <p>Operational Dashboard Ecosystem Pipeline Hub</p>
    <a href="hub.html" class="enter-btn">Initialize Central Hub Matrix</a>
  </div>

</body>
</html>
