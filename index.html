<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JLM Solutions — Command Gateway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0c1219;
      --surface:   #131c27;
      --surface2:  #1b2733;
      --border:    #25323f;
      --blue-lt:   #6ab0ff;
      --pink:      #e08890;
      --pink-dk:   #cf7480;
      --green:     #4caf7d;
      --red:       #e0625e;
      --text:      #dde7f0;
      --muted:     #6b8099;
    }

    * { box-sizing: border-box; }
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Inter', sans-serif; 
      font-size: 14px; 
      min-height: 100vh; 
      margin: 0; 
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* Family Branding Header */
    .jlm-header { text-align: center; padding: 4px 0 22px; }
    .jlm-logo { width: 150px; height: auto; display: block; margin: 0 auto 10px; }
    .jlm-devby { color: var(--muted); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; }
    .jlm-title { font-size: 22px; margin: 6px 0 0; letter-spacing: .16em; font-weight: 700; text-transform: uppercase; color: #fff; }

    /* Lock Card */
    .lock-card { 
      background: var(--surface); 
      border: 1px solid var(--border); 
      border-radius: 16px; 
      padding: 48px 44px; 
      width: 380px; 
      max-width: 100%; 
      text-align: center; 
      box-shadow: 0 32px 80px rgba(0,0,0,0.6); 
    }
    .lock-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-align: left; display: block; margin-bottom: 8px; margin-top: 14px; }
    
    /* Input & Interactive UI Fields */
    .lock-select { 
      width: 100%; 
      background: var(--surface2); 
      border: 1px solid var(--border); 
      border-radius: 8px; 
      padding: 12px 16px; 
      color: var(--text); 
      font-family: 'Inter', sans-serif; 
      font-size: 15px; 
      outline: none; 
      cursor: pointer; 
      appearance: none; 
      -webkit-appearance: none; 
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236b8099' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>"); 
      background-repeat: no-repeat; 
      background-position: right 14px center; 
    }
    .lock-select:focus { border-color: var(--blue-lt); }
    .lock-email { font-size: 12px; color: var(--muted); margin: 8px 0 16px; text-align: left; word-break: break-all; font-family: 'JetBrains Mono', monospace; }
    
    .lock-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 15px; letter-spacing: 0.12em; outline: none; transition: border-color 0.2s; }
    .lock-input:focus { border-color: var(--blue-lt); }
    .lock-input.error { border-color: var(--red); }
    
    .pw-wrap { position: relative; }
    .pw-wrap .lock-input { padding-right: 52px; }
    .pw-toggle { position: absolute; top: 50%; right: 8px; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; line-height: 1; padding: 6px 8px; border-radius: 6px; color: var(--muted); }
    .pw-toggle:hover { background: var(--surface); color: var(--text); }
    
    /* CTAs */
    .lock-btn { width: 100%; margin-top: 24px; padding: 13px; background: var(--pink); color: #0c1219; border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .lock-btn:hover { background: var(--pink-dk); }
    .lock-bio-btn { width: 100%; margin-top: 12px; padding: 13px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .lock-bio-btn:hover { border-color: var(--blue-lt); }
    .lock-bio-setup { margin-top: 16px; font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; text-decoration: underline; }
    .lock-bio-setup:hover { color: var(--text); }
    .lock-err { font-size: 12px; margin-top: 12px; min-height: 16px; font-weight: 500; }
  </style>
</head>

  let currentUserKey = 'jessica';

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  function onUserChange() {
    currentUserKey = document.getElementById('user-select').value;
    document.getElementById('user-email').textContent = USER_CONFIGS[currentUserKey].email;
    document.getElementById('lock-err').textContent = '';
    setupBiometricUI();
  }

  function showHub(userKey) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('hub').style.display = 'block';
    document.getElementById('hub-email').textContent = USER_CONFIGS[userKey].email;
    
    // Explicitly configure link behavior based on who is logged in
    const khoLink = document.getElementById('kho-link');
    if (userKey === 'jessica') {
      khoLink.href = "https://script.google.com/macros/s/AKfycbwZK3AQoPltuXU0dXMNU2baWg2wwyc5CCl5ndufYKKLPD1P6S4h9_GqJ8Swz_cIJAcg4w/exec?u=jess-all-m8t4ze";

    }
  }

  async function checkPassword() {
    const input = document.getElementById('pw-input').value;
    const hash = await sha256(input);
    const targetConfig = USER_CONFIGS[currentUserKey];

    if (hash === targetConfig.hash) {
      showHub(currentUserKey);
      sessionStorage.setItem(targetConfig.sessionKey, '1');
      sessionStorage.setItem('jlm_active_user', currentUserKey);
    } else {
      const inp = document.getElementById('pw-input');
      inp.classList.add('error');
      document.getElementById('lock-err').style.color = 'var(--red)';
      document.getElementById('lock-err').textContent = 'Incorrect password. Try again.';
      inp.value = '';
      setTimeout(() => inp.classList.remove('error'), 400);
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });

  // Check existing sessions safely
  const activeUser = sessionStorage.getItem('jlm_active_user');
  if (activeUser && USER_CONFIGS[activeUser] && sessionStorage.getItem(USER_CONFIGS[activeUser].sessionKey) === '1') {
    currentUserKey = activeUser;
    document.getElementById('user-select').value = activeUser;
    document.getElementById('user-email').textContent = USER_CONFIGS[activeUser].email;
    showHub(activeUser);
  }

  function logout() {
    const targetConfig = USER_CONFIGS[currentUserKey];
    sessionStorage.removeItem(targetConfig.sessionKey);
    sessionStorage.removeItem('jlm_active_user');
    document.getElementById('hub').style.display = 'none';
    document.getElementById('lock-screen').style.display = 'flex';
    document.getElementById('pw-input').value = '';
    document.getElementById('lock-err').textContent = '';
    setupBiometricUI();
  }

  function togglePassword() {
    const inp = document.getElementById('pw-input');
    const btn = document.getElementById('pw-toggle');
    if (inp.type === 'password') {
      inp.type = 'text'; btn.textContent = '🙈';
    } else {
      inp.type = 'password'; btn.textContent = '👁';
    }
    inp.focus();
  }

  // ===== Dynamic WebAuthn (Biometrics) Engine =====
  function b64ToBuf(b64) { const bin = atob(b64.replace(/-/g,'+').replace(/_/g,'/')); const u = new Uint8Array(bin.length); for (let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u.buffer; }
  function bufToB64(buf) { const u = new Uint8Array(buf); let s=''; for (let i=0;i<u.length;i++) s+=String.fromCharCode(u[i]); return btoa(s); }

  async function setupBiometricUI() {
    const loginBtn = document.getElementById('bio-login-btn');
    const setupBtn = document.getElementById('bio-setup-btn');
    const targetConfig = USER_CONFIGS[currentUserKey];
    let available = false;
    try {
      available = !!(window.PublicKeyCredential && await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable());
    } catch(e) { available = false; }
    if (!available) return;

    if (localStorage.getItem(targetConfig.bioKey)) {
      loginBtn.style.display = 'flex';
      setupBtn.style.display = 'none';
    } else {
      loginBtn.style.display = 'none';
      setupBtn.style.display = 'inline-block';
    }
  }

  async function enrollFingerprint() {
    const pw = document.getElementById('pw-input').value;
    const targetConfig = USER_CONFIGS[currentUserKey];
    if (!pw || (await sha256(pw)) !== targetConfig.hash) {
      const inp = document.getElementById('pw-input');
      inp.classList.add('error');
      document.getElementById('lock-err').style.color = 'var(--red)';
      document.getElementById('lock-err').textContent = 'Verify your password first, then run biometric setup.';
      setTimeout(() => inp.classList.remove('error'), 400);
      return;
    }
    try {
      const challenge = crypto.getRandomValues(new Uint8Array(32));
      const userId = new TextEncoder().encode(targetConfig.email);
      const cred = await navigator.credentials.create({
        publicKey: {
          challenge,
          rp: { name: 'JLM Solutions Gateway', id: location.hostname },
          user: { id: userId, name: targetConfig.email, displayName: targetConfig.name },
          pubKeyCredParams: [ { type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 } ],
          authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required', residentKey: 'preferred' },
          timeout: 60000,
        }
      });
      localStorage.setItem(targetConfig.bioKey, bufToB64(cred.rawId));
      document.getElementById('lock-err').style.color = 'var(--green)';
      document.getElementById('lock-err').textContent = `✓ Biometrics bound to ${targetConfig.name}.`;
      setupBiometricUI();
    } catch(e) {
      document.getElementById('lock-err').style.color = 'var(--red)';
      document.getElementById('lock-err').textContent = 'Biometric registration declined.';
    }
  }

  async function loginWithFingerprint() {
    const targetConfig = USER_CONFIGS[currentUserKey];
    const stored = localStorage.getItem(targetConfig.bioKey);
    if (!stored) return;
    try {
      const challenge = crypto.getRandomValues(new Uint8Array(32));
      const assertion = await navigator.credentials.get({
        publicKey: {
          challenge,
          allowCredentials: [ { id: b64ToBuf(stored), type: 'public-key' } ],
          userVerification: 'required',
          timeout: 60000,
        }
      });
      if (assertion) {
        showHub(currentUserKey);
        sessionStorage.setItem(targetConfig.sessionKey, '1');
        sessionStorage.setItem('jlm_active_user', currentUserKey);
      }
    } catch(e) {
      document.getElementById('lock-err').style.color = 'var(--red)';
      document.getElementById('lock-err').textContent = 'Authentication failed. Please type your password.';
    }
  }

  // Handle informative feedback on system lock for the Airbnb card
  document.getElementById('airbnb-card').addEventListener('click', (e) => {
    e.preventDefault();
    alert("Airbnb Dashboard System Notice:\n\nThis module is fully mapped out from 'Naxos_Airbnb (1).xlsx' (31 bookings, 144 nights) and assigned to Phase 5. The base files are verified. Access will unlock natively once development reaches Phase 5.");
  });

  setupBiometricUI();
</script>
