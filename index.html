<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JLM SOLUTIONS SYSTEM NETWORK PORTAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --border: #334155;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --teal: #2d6a4f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .wrapper { max-width: 500px; width: 100%; text-align: center; }
    .logo { width: 80px; height: auto; margin-bottom: 20px; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.02em; }
    p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
    .enter-btn { display: inline-block; background: var(--teal); color: #fff; padding: 14px 28px; border-radius: 8px; font-size: 15px; font-weight: 600; text-decoration: none; transition: background 0.15s; width: 100%; }
    .enter-btn:hover { background: #3a835d; }
  </style>
</head>
<body>
  <div class="wrapper">
    <img src="jlmlogo.png" alt="JLM Solutions Logo" class="logo">
    <div class="card">
      <h1>MASTER MANAGEMENT WORKSPACE</h1>
      <p>Operational Dashboard Ecosystem Pipeline Hub</p>
      <a href="hub.html" class="enter-btn">Initialize Central Hub Matrix</a>
    </div>
  </div>
</body>
</html>
