<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WORKSPACE ACCESS PORTAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --brand: #ff5a5f;
      --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 16px;
    }
    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    .lock-icon {
      font-size: 32px;
      margin-bottom: 16px;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
    p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    
    .input-group { margin-bottom: 16px; text-align: left; }
    label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.05em; }
    
    .password-field {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background: #0f172a;
      border: 1px solid var(--border);
      color: white;
      border-radius: 8px;
      text-align: center;
      letter-spacing: 0.1em;
      font-family: inherit;
    }
    .password-field:focus {
      outline: none;
      border-color: var(--brand);
    }
    
    .submit-btn {
      width: 100%;
      background: var(--brand);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: #e04f53; }
    
    .error-msg {
      font-size: 13px;
      color: #ef4444;
      margin-top: 12px;
      font-weight: 500;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="lock-icon">🔐</div>
    <h1>Console Gateway</h1>
    <p>Enter password to unlock operational matrices</p>
    
    <div class="input-group">
      <label for="pass-input">Security Password</label>
      <input type="password" id="pass-input" class="password-field" placeholder="••••••••" onkeydown="checkEnter(event)">
    </div>
    
    <button class="submit-btn" onclick="validateAccess()">Verify Access</button>
    <div class="error-msg" id="err-box">❌ Incorrect security password. Access Denied.</div>
  </div>

  <script>
    // UPDATED: Set Jessica's passphrase configuration parameter
    var PASSKEY = "nainai";

    function validateAccess() {
      var entry = document.getElementById('pass-input').value.trim();
      var errorBox = document.getElementById('err-box');

      if (entry.toLowerCase() === PASSKEY.toLowerCase()) {
        errorBox.style.display = "none";
        // Redirect directly into the operational hub center file
        window.location.href = "hub.html";
      } else {
        errorBox.style.display = "block";
        document.getElementById('pass-input').value = "";
      }
    }

    function checkEnter(event) {
      if (event.key === "Enter") {
        validateAccess();
      }
    }
  </script>
</body>
</html>
