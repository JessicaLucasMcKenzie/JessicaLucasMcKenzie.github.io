<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MASTER MANAGEMENT WORKSPACE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-main: #fbfbfb;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --btn-color: #2d6a4f;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .logo-img {
      height: 64px;
      width: auto;
      margin-bottom: 24px;
      object-fit: contain;
    }

    .card { 
      background: var(--card-bg); 
      border: 1px solid var(--border); 
      border-radius: 12px; 
      padding: 40px; 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    h1 { 
      font-size: 22px; 
      font-weight: 700; 
      margin-bottom: 12px; 
      letter-spacing: -0.01em;
      color: #0f172a;
      text-transform: uppercase;
    }

    p { 
      color: var(--text-muted); 
      font-size: 14px; 
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .user-select, .pass-input {
      width: 100%;
      padding: 12px 16px;
      background-color: #ffffff;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-main);
      font-size: 14px;
      font-weight: 500;
      outline: none;
    }

    .user-select {
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
      background-repeat: no-repeat;
      background-position: right 16px center;
      background-size: 16px;
    }

    .user-select:focus, .pass-input:focus {
      border-color: var(--btn-color);
    }

    .error-msg {
      color: #dc2626;
      font-size: 13px;
      font-weight: 500;
      margin-top: -8px;
      margin-bottom: 16px;
      display: none;
      text-align: left;
    }

    .enter-btn { 
      display: block;
      background: var(--btn-color); 
      color: #ffffff; 
      padding: 14px 28px; 
      border-radius: 6px; 
      font-size: 14px; 
      font-weight: 600; 
      text-decoration: none; 
      width: 100%; 
      text-align: center;
      border: none;
      cursor: pointer;
    }

    .enter-btn:hover { 
      background: #24543f; 
    }
  </style>
</head>
<body>

  <img src="jlmlogo.png" alt="JLM Solutions Logo" class="logo-img">
  
  <div class="card">
    <h1>MASTER MANAGEMENT WORKSPACE</h1>
    <p>Operational Dashboard Ecosystem Pipeline Hub</p>
    
    <div class="form-group">
      <label class="form-label">Select Active Operator Profile</label>
      <select class="user-select" id="operator-dropdown">
        <option value="prettinpinkjessm@gmail.com">prettinpinkjessm@gmail.com</option>
        <option value="manuellynch@gmail.com">manuellynch@gmail.com</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Security Password</label>
      <input type="password" class="pass-input" id="secure-pass" placeholder="Enter workspace password">
    </div>

    <div class="error-msg" id="error-banner">❌ Invalid authentication password string.</div>

    <button class="enter-btn" onclick="validateAndRoute()">Initialize Central Hub Matrix</button>
  </div>

  <script>
    function validateAndRoute() {
      var password = document.getElementById('secure-pass').value;
      var selectedUser = document.getElementById('operator-dropdown').value;
      var err = document.getElementById('error-banner');

      if (password.toLowerCase() === 'mango') {
        err.style.display = 'none';
        localStorage.setItem('active_matrix_operator', selectedUser);
        window.location.href = 'hub.html';
      } else {
        err.style.display = 'block';
      }
    }

    window.onload = function() {
      var saved = localStorage.getItem('active_matrix_operator');
      if (saved) {
        document.getElementById('operator-dropdown').value = saved;
      }
    };
  </script>

</body>
</html>
