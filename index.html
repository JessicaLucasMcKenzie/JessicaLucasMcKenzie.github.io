<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JLM SOLUTIONS - GATEWAY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0b111e;
      --card-bg: #fff1f2;
      --text: #1e293b;
      --text-muted: #64748b;
      --brand: #ff5a5f;
      --brand-hover: #e04f53;
      --border: #fecdd3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 16px;
    }
    .gateway-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .logo-box {
      width: 100%;
      max-width: 240px;
      margin: 0 auto 24px auto;
      background: #111827;
      padding: 16px;
      border-radius: 4px;
    }
    .logo-box img {
      width: 100%;
      height: auto;
      display: block;
    }
    .dev-by {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #0f172a;
      margin-bottom: 32px;
    }
    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .select-field, .input-field {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 600;
      background: #ffffff;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      font-family: inherit;
      appearance: none;
      -webkit-appearance: none;
    }
    .select-container {
      position: relative;
    }
    .select-container::after {
      content: '▼';
      font-size: 10px;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .email-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      padding-left: 4px;
    }
    .input-container {
      position: relative;
    }
    .input-field {
      padding-right: 44px;
      letter-spacing: 0.15em;
    }
    .toggle-visibility {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 16px;
      user-select: none;
    }
    .submit-btn {
      width: 100%;
      background: #db2777;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.2s;
    }
    .submit-btn:hover {
      background: #be185d;
    }
    .biometric-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: underline;
      cursor: pointer;
    }
    .error-box {
      font-size: 13px;
      color: #dc2626;
      margin-top: 16px;
      font-weight: 600;
      display: none;
    }
  </style>
</head>
<body>

  <div class="gateway-card">
    <div class="logo-box">
      <!-- Your custom JLM solutions banner image asset layout -->
      <img src="https://raw.githubusercontent.com/jessicalucasmckenzie/jessicalucasmckenzie.github.io/main/jlmsolutions.png" alt="JLM Solutions" onerror="this.src='jlmsolutions.png'">
    </div>
    <div class="dev-by">Developed by JLM Solutions</div>
    <h1>GATEWAY</h1>
    
    <div class="form-group">
      <label>Identity Node</label>
      <div class="select-container">
        <select id="user-select" class="select-field" onchange="updateEmail()">
          <option value="jessica">Jessica McKenzie</option>
          <option value="user">Lucas McKenzie</option>
        </select>
      </div>
      <div class="email-display" id="email-box">prettyinpinkjessm@gmail.com</div>
    </div>
    
    <div class="form-group">
      <label>Security Authentication Token</label>
      <div class="input-container">
        <input type="password" id="token-input" class="input-field" placeholder="••••••••" onkeydown="handleEnter(event)">
        <span class="toggle-visibility" onclick="togglePasswordView()">👁️</span>
      </div>
    </div>
    
    <button class="submit-btn" onclick="verifyCredentials()">Verify Credentials →</button>
    
    <div>
      <span class="biometric-link">Provision Biometric Signature On Device</span>
    </div>
    
    <div class="error-box" id="err-box">Authentication Token Invalid.</div>
  </div>

  <script>
    // Configured dynamic verification mapping matrix profile database values
    var credentials = {
      jessica: {
        email: "prettyinpinkjessm@gmail.com",
        pass: "nainai"
      },
      user: {
        email: "lucas@jlmsolutions.com", // Adjust fallback if needed
        pass: "mango"
      }
    };

    function updateEmail() {
      var selectedUser = document.getElementById('user-select').value;
      document.getElementById('email-box').innerText = credentials[selectedUser].email;
      document.getElementById('err-box').style.display = "none";
    }

    function togglePasswordView() {
      var field = document.getElementById('token-input');
      field.type = (field.type === "password") ? "text" : "password";
    }

    function verifyCredentials() {
      var selectedUser = document.getElementById('user-select').value;
      var inputPass = document.getElementById('token-input').value.trim();
      var errorMsg = document.getElementById('err-box');

      if (inputPass.toLowerCase() === credentials[selectedUser].pass.toLowerCase()) {
        errorMsg.style.display = "none";
        window.location.href = "hub.html";
      } else {
        errorMsg.style.display = "block";
        document.getElementById('token-input').value = "";
      }
    }

    function handleEnter(e) {
      if (e.key === "Enter") {
        verifyCredentials();
      }
    }
    
    window.onload = updateEmail;
  </script>
</body>
</html>
