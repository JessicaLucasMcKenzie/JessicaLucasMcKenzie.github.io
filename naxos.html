<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAXOS OPERATIONAL CONSOLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-main: #f8fafc;
      --sidebar-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --rose-primary: #ff5a5f;
      --rose-light: #fff1f2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 280px;
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px;
      flex-shrink: 0;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 20px;
      text-align: center;
    }
    .logo-img { width: 100%; max-width: 130px; height: auto; object-fit: contain; margin-bottom: 14px; }
    .logo-container h2 { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; color: #0f172a; text-transform: uppercase; }
    .logo-container p { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .meta-divider { width: 100%; border: 0; height: 1px; background-color: var(--border); margin: 16px 0; }
    .revision-block { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #94a3b8; text-transform: uppercase; margin-bottom: 16px; }

    .sidebar-actions { display: flex; flex-direction: column; gap: 12px; list-style: none; }
    .side-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: none;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #475569;
      cursor: pointer;
      text-align: left;
      text-decoration: none;
    }
    .side-btn.btn-active { background-color: var(--rose-light); color: var(--rose-primary); font-weight: 600; }

    .main-viewport { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 40px; }
    .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .top-header h1 { font-size: 20px; font-weight: 700; color: #0f172a; }
    .hub-matrix-btn { background: #ffffff; border: 1px solid #cbd5e1; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; color: var(--text-main); text-decoration: none; }

    .content-container { display: flex; flex-direction: column; gap: 24px; max-width: 1400px; width: 100%; margin: 0 auto; }
    .api-status-strip { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; padding: 12px 16px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }

    /* Calendar Grid Wrapper Layout */
    .calendar-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
    }
    .calendar-month {
      width: 100%;
    }
    .calendar-month-title {
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 24px;
      color: #0f172a;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      row-gap: 14px;
      text-align: center;
    }
    .calendar-day-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      padding-bottom: 12px;
    }

      font-size: 13px;
      font-weight: 500;
      height: 38px;
      width: 38px;
