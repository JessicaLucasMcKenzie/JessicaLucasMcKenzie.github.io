<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAXOS OBSERVE & OPS CONSOLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-main: #f8fafc;
      --sidebar-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --blue-primary: #0284c7; 
      --blue-light: #f0f9ff;
      --border: #e2e8f0;
      --orange-accent: #ea580c;
      --green-accent: #16a34a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 290px;
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px;
      flex-shrink: 0;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 20px;
      text-align: center;
    }

    .logo-home-link {
      display: block;
      width: 100%;
      cursor: pointer;
      transition: opacity 0.15s ease-in-out;
    }
    .logo-home-link:hover { opacity: 0.8; }

    .logo-img { width: 100%; max-width: 180px; height: auto; object-fit: contain; margin-bottom: 14px; }
    .logo-container h2 { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; color: #0f172a; text-transform: uppercase; }
    .logo-container p { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .meta-divider { width: 100%; border: 0; height: 1px; background-color: var(--border); margin: 16px 0; }
    .revision-block { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #94a3b8; text-transform: uppercase; margin-bottom: 16px; text-align: center; }

    .nav-links { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .nav-item button {
      width: 100%;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      color: #475569;
      background: none;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
    }
    .nav-item.active button {
      background-color: var(--blue-light);
      color: var(--blue-primary);
    }

    .main-viewport { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 40px; }
    .top-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .top-header h1 { font-size: 20px; font-weight: 700; color: #0f172a; }
    
    .header-actions-cluster {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .home-icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      border: 1px solid var(--border);
      width: 32px;
      height: 32px;
      border-radius: 6px;
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s ease-in-out;
    }
    .home-icon-btn:hover {
      background: #f8fafc;
      border-color: var(--blue-primary);
    }

    .back-hub-btn { background: var(--bg-main); border: 1px solid var(--border); padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; color: var(--text-main); text-decoration: none; }

    .content-container { display: flex; flex-direction: column; gap: 24px; max-width: 1400px; width: 100%; margin: 0 auto; }
    
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }
    .metric-card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .metric-card p { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
    .metric-card h3 { font-size: 24px; font-weight: 700; color: #0f172a; margin-top: 6px; }
