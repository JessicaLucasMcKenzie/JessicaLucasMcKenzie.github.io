<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAXOS OBSERVE & OPS CONSOLE</title>
  
  <script>
    (function() {
      var currentVersion = "v2.2.7_purge";
      if (localStorage.getItem("naxos_ops_version") !== currentVersion) {
        localStorage.setItem("naxos_ops_version", currentVersion);
        window.location.reload(true);
      }
    })();
  </script>

  <style>
    :root {
      --bg-main: #f8fafc; --sidebar-bg: #ffffff; --text-main: #1e293b; --text-muted: #64748b; --blue-primary: #0284c7; --blue-light: #f0f9ff; --border: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 290px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px; flex-shrink: 0; }
    .logo-container { display: flex; flex-direction: column; align-items: center; padding-bottom: 20px; text-align: center; }
    .logo-img { width: 100%; max-width: 180px; height: auto; object-fit: contain; margin-bottom: 14px; }
    .logo-container h2 { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; color: #0f172a; text-transform: uppercase; }
    .logo-container p { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .meta-divider { width: 100%; border: 0; height: 1px; background-color: var(--border); margin: 16px 0; }
    .revision-block { font-family: monospace; font-size: 10px; color: #94a3b8; text-transform: uppercase; margin-bottom: 16px; text-align: center; }
    .nav-links { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .nav-item button { width: 100%; display: flex; align-items: center; padding: 12px 16px; color: #475569; background: none; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; text-align: left; cursor: pointer; }
    .nav-item.active button { background-color: var(--blue-light); color: var(--blue-primary); }
    .main-viewport { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 40px; }
    .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .top-header h1 { font-size: 20px; font-weight: 700; color: #0f172a; }
    .back-hub-btn { background: var(--bg-main); border: 1px solid var(--border); padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; color: var(--text-main); text-decoration: none; }
    .content-container { display: flex; flex-direction: column; gap: 24px; max-width: 1400px; width: 100%; margin: 0 auto; }
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
    .metric-card { background: #ffffff; border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .metric-card p { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
    .metric-card h3 { font-size: 24px; font-weight: 700; color: #0f172a; margin-top: 6px; }
    .panel { background: #ffffff; border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
    .api-status-strip { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 12px 16px; border-radius: 8px; font-family: monospace; font-size: 11px; }
    .data-table { width: 100%; border-collapse: collapse; text-align: left; }
    .data-table th { padding: 14px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); border-bottom: 2px solid var(--border); background-color: #f8fafc; }
    .data-table td { padding: 16px 16px; font-size: 13px; border-bottom: 1px solid var(--border); color: #334155; }
    .index-badge { font-family: monospace; background: #e2e8f0; color: #475569; padding: 4px 6px; border-radius: 4px; font-size: 12px; }
    .badge-blocked { background-color: #fee2e2; color: #991b1b; padding: 4px 8px; font-size: 11px; font-weight: 600; border-radius: 6px; }
    .crm-drawer { position: fixed; top: 0; right: 0; width: 480px; max-width: 100vw; height: 100vh; background: #ffffff; box-shadow: -10px 0 40px rgba(0,0,0,0.1); transform: translateX(100%); transition: transform 0.25s ease; z-index: 2000; display: flex; flex-direction: column; }
    .crm-drawer.drawer-open { transform: translateX(0); }
    .drawer-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #f8fafc; }
    .drawer-body { padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
    .doc-section { display: flex; flex-direction: column; gap: 4px; }
    .doc-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }
    .doc-content-box { background: #f8fafc; border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-size: 13px; }
    .checklist-box { background: #fffbeb; border: 1px solid #fef3c7; color: #92400e; padding: 12px; border-radius: 8px; font-size: 12px; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo-container">
      <a href="hub.html" style="display:block; width:100%;"><img src="NEIGHBORHOOD DENTAL LOGO.png" alt="Logo" class="logo-img"></a>
      <h2>NAXOS DASHBOARD</h2>
      <p>Airbnb Workspace 🇬🇷</p>
      <hr class="meta-divider">
      <div class="revision-block">Rev. 1.0.2</div>
    </div>
    <ul class="nav-links"><li class="nav-item active"><button>📋 Operational Log</button></li></ul>
  </aside>

  <div class="crm-drawer" id="profile-drawer">
    <div class="drawer-header"><h3 id="drawer-guest-name">Guest Detail</h3><button style="border:none; background:none; font-size:20px; cursor:pointer;" onclick="closeProfileDrawer()">✕</button></div>
    <div class="drawer-body" id="drawer-document-content"></div>
  </div>

  <main class="main-viewport">
    <header class="top-header"><h1>NAXOS OPERATIONAL CONSOLE</h1><a href="hub.html" class="back-hub-btn">⚙️ Hub Matrix</a></header>
    <div class="content-container">
      <div class="api-status-strip" id="api-status">📡 Syncing Pipeline...</div>
      <div class="metrics-grid">
        <div class="metric-card"><p>Total Booked Stays</p><h3 id="metric-total-stays">-</h3></div>
        <div class="metric-card"><p>Total Nights Hosted</p><h3 id="metric-total-nights">-</h3></div>
        <div class="metric-card"><p>Gross Cleaning Costs</p><h3 id="metric-total-cleaning">-</h3></div>
      </div>
      <section class="panel">
        <table class="data-table">
          <thead><tr><th>Ref #</th><th>Stay Dates</th><th>Nights</th><th>Guest Name</th><th>Guests</th><th>Check-In Details</th><th>Check-Out</th><th>Cleaning Fee</th></tr></thead>
          <tbody id="ops-table-body"></tbody>
        </table>
      </section>
    </div>
  </main>

  <script>
    var SPREADSHEET_ID = "1TvZdAANoIITpGLbrWKGh7ujniEgPq3rgI2tNbi4yB1o";
    var globalOpsDatabase = [];

    function loadLiveNaxosStreams() {
      var bust = new Date().getTime();
      var url = "https://docs.google.com/spreadsheets/d/" + SPREADSHEET_ID + "/gviz/tq?tqx=out:json&sheet=Naxos+Ops&_=" + bust;
      fetch(url).then(r => r.text()).then(text => {
        var rawJson = JSON.parse(text.substr(47).slice(0, -2));
        processRows(rawJson.table.rows);
        calculateMetrics();
        renderTable();
        document.getElementById('api-status').innerHTML = "✅ API Status: Success. Synced " + globalOpsDatabase.length + " logs.";
      });
    }

    function processRows(rows) {
      if (!rows) return; globalOpsDatabase = [];
      rows.forEach((row, index) => {
        if (index === 0) return; var cells = row.c; if (!cells || !cells[0] || cells[0].v === null) return;
        globalOpsDatabase.push({
          id: index, airbnbNum: cells[0].v.toString(), stayDates: cells[1]?cells[1].v.toString():"", nights: cells[2]?cells[2].v:0, guestName: cells[3]?cells[3].v.toString():"", totalGuests: cells[4]?cells[4].v.toString():"", phone: cells[5]?cells[5].v.toString():"Not Listed", checkIn: cells[6]?cells[6].v.toString():"Standard", checkOut: cells[7]?cells[7].v.toString():"", cleaningFee: cells[8]?cells[8].v.toString():"€0", notes: cells[9]?cells[9].v.toString():"No notes."
        });
      });
    }

    function calculateMetrics() {
      var s = 0, n = 0, c = 0;
      globalOpsDatabase.forEach(i => {
        if (i.guestName.toLowerCase().includes("blocked")) return; s++;
        if(!isNaN(parseInt(i.nights))) n += parseInt(i.nights);
        var parsed = parseFloat(i.cleaningFee.replace(/[^0-9.]/g, '')); if(!isNaN(parsed)) c += parsed;
      });
      document.getElementById('metric-total-stays').textContent = s;
      document.getElementById('metric-total-nights').textContent = n + " Days";
      document.getElementById('metric-total-cleaning').textContent = "€" + c.toLocaleString();
    }

    function renderTable() {
      var body = document.getElementById('ops-table-body'); body.innerHTML = "";
      globalOpsDatabase.forEach(row => {
        var tr = document.createElement('tr'); tr.style.cursor = "pointer"; tr.setAttribute('onclick', 'openProfileDrawer(' + row.id + ')');
        var nameDisplay = row.guestName.toLowerCase().includes("blocked") ? '<span class="badge-blocked">Calendar Blocked</span>' : row.guestName;
        tr.innerHTML = ['<td><span class="index-badge">' + row.airbnbNum + '</span></td>','<td><strong>' + row.stayDates + '</strong></td>','<td>' + row.nights + '</td>','<td><strong>' + nameDisplay + '</strong></td>','<td>' + row.totalGuests + '</td>','<td>' + row.checkIn + '</td>','<td><strong>' + row.checkOut + '</strong></td>','<td><span style="color:#0284c7; font-weight:600;">' + row.cleaningFee + '</span></td>'].join('');
        body.appendChild(tr);
      });
    }

    function openProfileDrawer(rowId) {
      var r = globalOpsDatabase.find(item => item.id === rowId); if (!r) return;
      document.getElementById('drawer-guest-name').textContent = r.guestName.toUpperCase();
      document.getElementById('drawer-document-content').innerHTML = [
        '<div class="doc-section"><span class="doc-label">Airbnb Ref ID</span><div class="doc-content-box">' + r.airbnbNum + '</div></div>',
        '<div class="doc-section"><span class="doc-label">Stay Window</span><div class="doc-content-box">' + r.stayDates + ' (' + r.nights + ' Nights)</div></div>',
        '<div class="doc-section"><span class="doc-label">Phone</span><div class="doc-content-box">' + r.phone + '</div></div>',
        '<div class="doc-section"><span class="doc-label">Check-In Instruction Logs</span><div class="doc-content-box">' + r.checkIn + '</div></div>',
        '<div class="doc-section"><span class="doc-label">Cleaning Manifest Notes</span><div class="doc-content-box">' + r.notes + '</div></div>',
        '<div class="doc-section"><span class="doc-label">Casa Nai Nai Constants</span><div class="checklist-box"><strong>🔑 House Box:</strong> 0007<br><strong>📦 Closet Code:</strong> 122</div></div>'
      ].join('');
      document.getElementById('profile-drawer').classList.add('drawer-open');
    }
    function closeProfileDrawer() { document.getElementById('profile-drawer').classList.remove('drawer-open'); }
    window.onload = function() { loadLiveNaxosStreams(); };
  </script>
</body>
</html>
