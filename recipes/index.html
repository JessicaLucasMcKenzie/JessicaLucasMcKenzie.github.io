<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free From That — My Recipe Maker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0c1219;
      --surface:   #131c27;
      --surface2:  #1b2733;
      --border:    #25323f;
      --green:     #4caf7d;
      --green-dk:  #3b9366;
      --text:      #dde7f0;
      --muted:     #6b8099;
      --red:       #e0625e;
    }

    * { box-sizing: border-box; }
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Inter', sans-serif; 
      font-size: 14px; 
      min-height: 100vh; 
      margin: 0; 
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .recipe-card { 
      background: var(--surface); 
      border: 1px solid var(--border); 
      border-radius: 16px; 
      padding: 44px; 
      width: 520px; 
      max-width: 100%; 
      box-shadow: 0 32px 80px rgba(0,0,0,0.6); 
    }

    .brand-header { text-align: center; margin-bottom: 32px; }
    .brand-title { font-size: 26px; font-weight: 700; color: #fff; margin: 0 0 4px 0; letter-spacing: -0.02em; }
    .brand-subtitle { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 0; font-weight: 600; }

    .form-group { margin-bottom: 24px; }
    .field-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 10px; font-weight: 600; }
    .field-label span { text-transform: none; font-weight: 400; font-style: normal; margin-left: 4px; }
    
    .field-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
    .field-input:focus { border-color: var(--green); }
    .field-textarea { resize: none; min-height: 74px; font-family: inherit; line-height: 1.5; }

    /* Pill Selection Layouts */
    .pill-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .pill { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; user-select: none; transition: all 0.2s ease; }
    .pill:hover { border-color: var(--muted); }
    
    /* Toggled States */
    .pill.selected-idea { background: rgba(76, 175, 125, 0.15); border-color: var(--green); color: #fff; font-weight: 500; }
    .pill.selected-allergy { background: rgba(224, 98, 94, 0.15); border-color: var(--red); color: #fff; font-weight: 500; }

    .submit-btn { width: 100%; margin-top: 8px; padding: 14px; background: var(--green); color: #0c1219; border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .submit-btn:hover { background: var(--green-dk); }
    .status-msg { font-size: 12px; margin-top: 14px; min-height: 16px; font-weight: 500; text-align: center; }
  </style>
</head>
<body>

<div class="recipe-card">
  <div class="brand-header">
    <h1 class="brand-title">My Recipe Maker</h1>
    <p class="brand-subtitle">Free From Allergens / Free From Animal Products</p>
  </div>

  <form id="recipe-form" onsubmit="handleRecipeSubmit(event)">
    
    <!-- Section 1: Idea Suggestions (Single Select) -->
    <div class="form-group">
      <label class="field-label">Need an idea? <span>tap one</span></label>
      <div class="pill-grid">
        <div class="pill" onclick="selectIdea(this, 'Chocolate éclairs')">Chocolate éclairs</div>
        <div class="pill" onclick="selectIdea(this, 'Macarons')">Macarons</div>
        <div class="pill" onclick="selectIdea(this, 'Cheesecake')">Cheesecake</div>
        <div class="pill" onclick="selectIdea(this, 'Tiramisu')">Tiramisu</div>
        <div class="pill" onclick="selectIdea(this, 'Mousse cake')">Mousse cake</div>
        <div class="pill" onclick="selectIdea(this, 'Burger')">Burger</div>
        <div class="pill" onclick="selectIdea(this, 'Brownies')">Brownies</div>
        <div class="pill" onclick="selectIdea(this, 'Brioche')">Brioche</div>
        <div class="pill" onclick="selectIdea(this, 'Pizza')">Pizza</div>
        <div class="pill" onclick="selectIdea(this, 'Chicken dish')">Chicken dish</div>
      </div>
    </div>

    <!-- Section 2: Text Customization Input -->
    <div class="form-group">
      <label class="field-label" for="prompt-input">What would you like to make?</label>
      <textarea id="prompt-input" class="field-input field-textarea" placeholder="What's your dream bake? Or tell me what ingredients you've got..."></textarea>
    </div>

    <!-- Section 3: Allergies & Intolerances (Multi-Select) -->
    <div class="form-group">
      <label class="field-label">Allergies & Intolerances</label>
      <div class="pill-grid">
        <div class="pill" onclick="toggleAllergy(this, 'Gluten')">Gluten</div>
        <div class="pill" onclick="toggleAllergy(this, 'Nuts')">Nuts</div>
        <div class="pill" onclick="toggleAllergy(this, 'Peanuts')">Peanuts</div>
        <div class="pill" onclick="toggleAllergy(this, 'Dairy')">Dairy</div>
        <div class="pill" onclick="toggleAllergy(this, 'Eggs')">Eggs</div>
        <div class="pill" onclick="toggleAllergy(this, 'Soy')">Soy</div>
        <div class="pill" onclick="toggleAllergy(this, 'Seafood')">Seafood</div>
      </div>
    </div>

    <!-- Section 4: Email Ingress -->
    <div class="form-group">
      <label class="field-label" for="email-input">Where should we send your recipe? <span>enter your email to continue</span></label>
      <input type="email" id="email-input" class="field-input" placeholder="you@example.com" required>
    </div>

    <button type="submit" class="submit-btn">✨ Generate Recipe</button>
  </form>
  
  <div id="status-feedback" class="status-msg"></div>
</div>

<script>
  const GOOGLE_DEPLOYMENT_URL = "https://script.google.com/macros/s/AKfycbzSirnvODegEE0xbyNT9VFr3lz-7ev2gt6O6dyFCgrrgTUIHT9ujAqoUxAkzyj7lw1dkA/exec";
  
  let chosenIdea = "";
  let activeAllergies = [];

  function selectIdea(element, ideaName) {
    // Clear selection state from other idea pills
    document.querySelectorAll('.selected-idea').forEach(el => el.classList.remove('selected-idea'));
    
    if (chosenIdea === ideaName) {
      chosenIdea = ""; // Toggle off if tapped again
    } else {
      chosenIdea = ideaName;
      element.classList.add('selected-idea');
      // Sync choice straight into text area for clean context pass
      document.getElementById('prompt-input').value = `Looking to make: ${ideaName}.`;
    }
  }

  function toggleAllergy(element, allergyName) {
    const index = activeAllergies.indexOf(allergyName);
    if (index > -1) {
      activeAllergies.splice(index, 1);
      element.classList.remove('selected-allergy');
    } else {
      activeAllergies.push(allergyName);
      element.classList.add('selected-allergy');
    }
  }

  async function handleRecipeSubmit(event) {
    event.preventDefault();
    
    const emailField = document.getElementById('email-input');
    const customPromptField = document.getElementById('prompt-input');
    const feedback = document.getElementById('status-feedback');
    
    feedback.textContent = "";

    // Build the structural prompt string out of tap arrays automatically to save typing friction
    let structuralPrompt = `Recipe Type: ${chosenIdea || "Custom Request"}. `;
    if (customPromptField.value.trim().length > 0) {
      structuralPrompt += `Notes: ${customPromptField.value.trim()}. `;
    }
    structuralPrompt += `Exclusions: ${activeAllergies.length > 0 ? activeAllergies.join(', ') : 'None'}.`;

    const payload = {
      email: emailField.value.trim(),
      prompt: structuralPrompt,
      timestamp: new Date().toISOString()
    };

    try {
      feedback.style.color = "var(--muted)";
      feedback.textContent = "Connecting to database pipeline...";

      await fetch(GOOGLE_DEPLOYMENT_URL, {
        method: "POST",
        mode: "no-cors", 
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      feedback.style.color = "var(--green)";
      feedback.textContent = "Parameters synchronized. Loading generator matrix...";
      
      setTimeout(() => {
        window.location.href = "page-map.html?session=" + btoa(payload.email);
      }, 1000);

    } catch (error) {
      feedback.style.color = "var(--red)";
      feedback.textContent = "Network synchronization dropped.";
    }
  }
</script>
</body>
</html>
