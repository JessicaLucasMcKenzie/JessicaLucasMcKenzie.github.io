<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Recipe Maker — Global Processing Node</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
  
  <!-- Secure Leaflet Mapping Engine Core CSS/JS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

  <style>
    :root {
      --bg: #0c1219;
      --navy-banner: #1a365d;
      --accent-yellow: #f59e0b;
      --text: #dde7f0;
    }

    * { box-sizing: border-box; }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top Identity Bar */
    .top-navbar {
      background: #ffffff;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e2e8f0;
    }
    .brand-group h1 {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .brand-group p {
      font-size: 11px;
      color: #64748b;
      margin: 2px 0 0 0;
    }
    .counter-badge {
      background: #0f172a;
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
    }
    .counter-badge span {
      color: var(--accent-yellow);
      font-weight: 700;
    }

    /* Core Editorial Metric Ribbon */
    .metric-ribbon {
      background: var(--navy-banner);
      color: #ffffff;
      text-align: center;
      padding: 14px 20px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 18px;
      letter-spacing: 0.02em;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    /* Map Viewport Container */
    .map-viewport {
      flex: 1;
      width: 100%;
      position: relative;
    }
    #live-map {
      width: 100%;
      height: 100%;
      background-color: #0d1117;
    }

    /* Action Control Overlay */
    .cta-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      text-align: center;
      width: 100%;
      pointer-events: none;
    }
    .action-btn {
      background: #1d4ed8;
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 14px 44px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      transition: all 0.2s ease-in-out;
      opacity: 0;
      transform: scale(0.9);
    }
    .action-btn.reveal {
      opacity: 1;
      transform: scale(1);
    }
    .action-btn:hover {
      background: #2563eb;
      transform: scale(1.03);
    }

    /* Deep Dark Map Overrides */
    .leaflet-container { background: #0c1219 !important; }
    .leaflet-control-zoom { display: none !important; }
    .leaflet-control-attribution { background: rgba(0,0,0,0.4) !important; color: #475569 !important; font-size: 9px !important; }

    /* Elegant Glowing Gold Marker Styles */
    .glow-marker {
      background: transparent;
      border: none;
    }
    .marker-ring {
      width: 14px;
      height: 14px;
      background: rgba(245, 158, 11, 0.25);
      border: 2px solid var(--accent-yellow);
      border-radius: 50%;
      position: absolute;
      top: -7px;
      left: -7px;
      box-shadow: 0 0 10px var(--accent-yellow);
      animation: pulseGlow 2.5s infinite ease-in-out;
    }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(0.95); opacity: 0.8; box-shadow: 0 0 6px var(--accent-yellow); }
      50% { transform: scale(1.35); opacity: 1; box-shadow: 0 0 16px var(--accent-yellow); }
    }
  </style>
</head>
<body>

  <nav class="top-navbar">
    <div class="brand-group">
      <h1>✨ My Recipe Maker</h1>
      <p>Recipes cooking around the world</p>
    </div>
    <div class="counter-badge">
      Showing <span>59</span> recipes worldwide
    </div>
  </nav>

  <header class="metric-ribbon">
    Over 70 chefs worldwide have made recipes with Free From That
  </header>

  <main class="map-viewport">
    <div id="live-map"></div>
    
    <div class="cta-container">
      <button class="action-btn" id="trigger-cta" onclick="routeToFinalOutput()">View Your Recipe →</button>
    </div>
  </main>

  <script>
    // Initialize the real-world world map projection
    const map = L.map('live-map', {
      center: [35.0, -20.0],
      zoom: 3,
      minZoom: 2,
      maxZoom: 6,
      zoomControl: false,
      attributionControl: true
    });

    // Securely stream the premium CartoDB Dark Matter map tile layers over HTTPS
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    // Pinpoint coordinates matching your exact community distribution spots
    const coordinates = [
      [37.7749, -122.4194], // San Francisco
      [34.0522, -118.2437], // Los Angeles
      [32.7157, -117.1611], // San Diego
      [40.7128, -74.0060],  // New York
      [42.3601, -71.0589],  // Boston
      [41.8781, -87.6298],  // Chicago
      [10.4806, -66.9036],  // Caracas, Venezuela
      [51.5074, -0.1278],   // London, UK
      [53.4808, -2.2426],   // Manchester, UK
      [48.8566, 2.3522],    // Paris, France
      [40.4168, -3.7038],   // Madrid, Spain
      [43.7696, 11.2558]    // Florence, Italy
    ];

    // Map your glowing markers onto the physical land masses
    coordinates.forEach(coords => {
      const goldIcon = L.divIcon({
        className: 'glow-marker',
        html: '<div class="marker-ring"></div>',
        iconSize: [14, 14]
      });
      L.marker(coords, { icon: goldIcon }).addTo(map);
    });

    window.onload = function() {
      setTimeout(() => {
        document.getElementById('trigger-cta').classList.add('reveal');
      }, 2200);
    };

    function routeToFinalOutput() {
      window.location.href = "../admin.html";
    </div>
  </script>
</body>
</html>
