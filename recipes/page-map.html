<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Recipe Maker — Global Processing Node</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0c1219;
      --navy-banner: #1a365d;
      --accent-yellow: #f59e0b;
      --text: #dde7f0;
      --muted: #6b8099;
      --land-color: #1e293b;
    }

    * { box-sizing: border-box; }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top Identity Bar */
    .top-navbar {
      background: #ffffff;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e2e8f0;
    }
    .brand-group h1 {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .brand-group p {
      font-size: 11px;
      color: #64748b;
      margin: 2px 0 0 0;
    }
    .counter-badge {
      background: #0f172a;
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
    }
    .counter-badge span {
      color: var(--accent-yellow);
      font-weight: 700;
    }

    /* Core Editorial Metric Ribbon */
    .metric-ribbon {
      background: var(--navy-banner);
      color: #ffffff;
      text-align: center;
      padding: 14px 20px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 18px;
      letter-spacing: 0.02em;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    /* Map Interface Viewport */
    .map-viewport {
      flex: 1;
      width: 100%;
      position: relative;
      background-color: #0b0f15;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Embedded Vector Map Style */
    .svg-world-map {
      width: 90%;
      height: auto;
      max-height: 80%;
    }
    .continent {
      fill: var(--land-color);
      stroke: #0f172a;
      stroke-width: 0.5;
    }

    /* Action Presentation Control overlay */
    .cta-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      text-align: center;
      width: 100%;
    }
    .action-btn {
      background: #1d4ed8;
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 14px 36px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      transition: all 0.2s ease-in-out;
      opacity: 0;
      transform: scale(0.9);
    }
    .action-btn.reveal {
      opacity: 1;
      transform: scale(1);
    }
    .action-btn:hover {
      background: #2563eb;
      transform: scale(1.03);
    }

    /* Glowing Hotspot Markers placed perfectly relative to world view coordinates */
    .hotspot {
      position: absolute;
      width: 12px;
      height: 12px;
      background: rgba(245, 158, 11, 0.4);
      border: 2px solid var(--accent-yellow);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--accent-yellow);
      animation: pulseGlow 2.2s infinite ease-in-out;
    }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(0.9); opacity: 0.7; box-shadow: 0 0 8px var(--accent-yellow); }
      50% { transform: scale(1.5); opacity: 1; box-shadow: 0 0 18px var(--accent-yellow); }
    }
  </style>
</head>
<body>

  <!-- Top Navigation Frame -->
  <nav class="top-navbar">
    <div class="brand-group">
      <h1>✨ My Recipe Maker</h1>
      <p>Recipes cooking around the world</p>
    </div>
    <div class="counter-badge">
      Showing <span>59</span> recipes worldwide
    </div>
  </nav>

  <!-- Editorial Sub-Header Banner Row -->
  <header class="metric-ribbon">
    Over 70 chefs worldwide have made recipes with Free From That
  </header>

  <!-- Primary Map Section -->
  <main class="map-viewport">
    
    <!-- Clean inline vector geometric approximations of global continents to prevent hotlinking dependency blocks -->
    <svg class="svg-world-map" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
      <!-- North America -->
      <path class="continent" d="M100,100 L180,80 L280,60 L320,100 L380,120 L330,180 L350,220 L300,240 L280,210 L250,260 L240,290 L200,270 L150,220 L110,180 Z" />
      <!-- South America -->
      <path class="continent" d="M250,295 L290,300 L330,330 L350,370 L320,440 L290,480 L275,480 L260,420 L230,350 L240,320 Z" />
      <!-- Greenland -->
      <path class="continent" d="M340,40 L400,30 L420,60 L370,90 L330,70 Z" />
      <!-- Africa -->
      <path class="continent" d="M440,240 L490,210 L540,220 L580,260 L570,320 L540,380 L500,430 L485,430 L470,360 L440,310 L420,260 Z" />
      <!-- Europe & Asia -->
      <path class="continent" d="M450,190 L440,150 L480,100 L520,80 L600,60 L700,50 L850,70 L900,110 L880,180 L820,240 L750,260 L700,220 L650,250 L610,230 L550,210 L500,180 Z" />
      <!-- Australia -->
      <path class="continent" d="M760,340 L820,330 L850,360 L830,410 L770,400 L740,370 Z" />
    </svg>

    <!-- Hotspots relative to container boundaries matching your geographical points -->
    <!-- North America Cluster -->
    <div class="hotspot" style="top: 34%; left: 15%; animation-delay: 0s;"></div>
    <div class="hotspot" style="top: 38%; left: 19%; animation-delay: 0.3s;"></div>
    <div class="hotspot" style="top: 42%; left: 23%; animation-delay: 0.6s;"></div>
    <div class="hotspot" style="top: 45%; left: 26%; animation-delay: 0.2s;"></div>
    <div class="hotspot" style="top: 40%; left: 30%; animation-delay: 0.8s;"></div>

    <!-- South America / Venezuela -->
    <div class="hotspot" style="top: 62%; left: 31%; animation-delay: 1.1s;"></div>

    <!-- United Kingdom & Western Europe Cluster -->
    <div class="hotspot" style="top: 26%; left: 47%; animation-delay: 0.4s;"></div>
    <div class="hotspot" style="top: 29%; left: 49%; animation-delay: 0.9s;"></div>
    <div class="hotspot" style="top: 31%; left: 51%; animation-delay: 1.3s;"></div>
    <div class="hotspot" style="top: 34%; left: 52%; animation-delay: 0.5s;"></div>
    <div class="hotspot" style="top: 37%; left: 48%; animation-delay: 0.7s;"></div>
  </main>

  <!-- Interactive Execution Floating Action Control -->
  <div class="cta-container">
    <button class="action-btn" id="trigger-cta" onclick="routeToFinalOutput()">View Your Recipe →</button>
  </div>

  <script>
    // Reveal the action button cleanly after a short data generation delay
    window.onload = function() {
      setTimeout(() => {
        document.getElementById('trigger-cta').classList.add('reveal');
      }, 1800);
    };

    function routeToFinalOutput() {
      window.location.href = "../admin.html";
    </div>
  </script>
</body>
</html>
