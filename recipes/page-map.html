<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Recipe Maker — Global Processing Node</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0c1219;
      --navy-banner: #1a365d;
      --accent-yellow: #f59e0b;
      --text: #dde7f0;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top Identity Bar */
    .top-navbar {
      background: #ffffff;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e2e8f0;
    }
    .brand-group h1 {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .brand-group p {
      font-size: 11px;
      color: #64748b;
      margin: 2px 0 0 0;
    }
    .counter-badge {
      background: #0f172a;
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
    }
    .counter-badge span {
      color: var(--accent-yellow);
      font-weight: 700;
    }

    /* Core Editorial Metric Ribbon */
    .metric-ribbon {
      background: var(--navy-banner);
      color: #ffffff;
      text-align: center;
      padding: 14px 20px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 18px;
      letter-spacing: 0.02em;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    /* Map Interface Viewport using a high-fidelity SVG world outline map */
    .map-viewport {
      flex: 1;
      width: 100%;
      position: relative;
      background-color: #0e1722;
      background-image: url('https://upload.wikimedia.org/wikipedia/commons/1/18/World_map_blank_black_white.svg');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      /* Using full CSS filters to transform the stock image into your beautiful custom dark slate style */
      filter: invert(1) hue-rotate(180deg) brightness(0.3) contrast(1.2);
    }

    /* Action Presentation Control overlay */
    .cta-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      text-align: center;
      width: 100%;
    }
    .action-btn {
      background: #1d4ed8;
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 14px 36px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      transition: all 0.2s ease-in-out;
      opacity: 0;
      transform: scale(0.9);
    }
    .action-btn.reveal {
      opacity: 1;
      transform: scale(1);
    }
    .action-btn:hover {
      background: #2563eb;
      transform: scale(1.03);
    }

    /* Glowing Hotspot Markers placed perfectly relative to world view coordinates */
    .hotspot {
      position: absolute;
      width: 12px;
      height: 12px;
      background: rgba(245, 158, 11, 0.4);
      border: 2px solid var(--accent-yellow);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--accent-yellow);
      animation: pulseGlow 2.2s infinite ease-in-out;
    }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(0.9); opacity: 0.7; box-shadow: 0 0 8px var(--accent-yellow); }
      50% { transform: scale(1.5); opacity: 1; box-shadow: 0 0 18px var(--accent-yellow); }
    }
  </style>
</head>
<body>

  <!-- Top Navigation Frame -->
  <nav class="top-navbar">
    <div class="brand-group">
      <h1>✨ My Recipe Maker</h1>
      <p>Recipes cooking around the world</p>
    </div>
    <div class="counter-badge">
      Showing <span>59</span> recipes worldwide
    </div>
  </nav>

  <!-- Editorial Sub-Header Banner Row -->
  <header class="metric-ribbon">
    Over 70 chefs worldwide have made recipes with Free From That
  </header>

  <!-- Primary Map Section -->
  <main class="map-viewport" id="map-frame">
    <!-- North America Nodes -->
    <div class="hotspot" style="top: 32%; left: 16%; animation-delay: 0s;"></div>
    <div class="hotspot" style="top: 36%; left: 19%; animation-delay: 0.3s;"></div>
    <div class="hotspot" style="top: 40%; left: 24%; animation-delay: 0.6s;"></div>
    <div class="hotspot" style="top: 42%; left: 28%; animation-delay: 0.2s;"></div>
    <div class="hotspot" style="top: 38%; left: 31%; animation-delay: 0.8s;"></div>

    <!-- South America Node -->
    <div class="hotspot" style="top: 66%; left: 38%; animation-delay: 1.1s;"></div>

    <!-- United Kingdom & European Nodes -->
    <div class="hotspot" style="top: 24%; left: 48%; animation-delay: 0.4s;"></div>
    <div class="hotspot" style="top: 26%; left: 50%; animation-delay: 0.9s;"></div>
    <div class="hotspot" style="top: 29%; left: 51%; animation-delay: 1.3s;"></div>
    <div class="hotspot" style="top: 32%; left: 52%; animation-delay: 0.5s;"></div>
    <div class="hotspot" style="top: 35%; left: 50%; animation-delay: 0.7s;"></div>
  </main>

  <!-- Interactive Execution Floating Action Control -->
  <div class="cta-container">
    <button class="action-btn" id="trigger-cta" onclick="routeToFinalOutput()">View Your Recipe →</button>
  </div>

  <script>
    // Reveal the action button cleanly after a short data generation delay
    window.onload = function() {
      setTimeout(() => {
        document.getElementById('trigger-cta').classList.add('reveal');
      }, 2000);
    };

    function routeToFinalOutput() {
      window.location.href = "../admin.html";
    </div>
  </script>
</body>
</html>
